services:
  postgres:
    image: postgres:16
    container_name: tfl-cycle-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: tfl-cycle-airflow:local
    container_name: tfl-cycle-airflow-init
    working_dir: /opt/project
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/project/orchestration/dags
      AIRFLOW__CORE__PLUGINS_FOLDER: /opt/project/plugins
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/project/logs
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      PYTHONPATH: /opt/project/src
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./:/opt/project
    command: >
      bash -c "
      mkdir -p /opt/project/logs /opt/project/plugins /opt/project/warehouse &&
      airflow db migrate &&
      airflow users create
      --username ${AIRFLOW_ADMIN_USER:-airflow}
      --password ${AIRFLOW_ADMIN_PASSWORD:-airflow}
      --firstname Airflow
      --lastname Admin
      --role Admin
      --email admin@example.com || true
      "
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    image: tfl-cycle-airflow:local
    container_name: tfl-cycle-airflow-webserver
    working_dir: /opt/project
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/project/orchestration/dags
      AIRFLOW__CORE__PLUGINS_FOLDER: /opt/project/plugins
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/project/logs
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      PYTHONPATH: /opt/project/src
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./:/opt/project
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    image: tfl-cycle-airflow:local
    container_name: tfl-cycle-airflow-scheduler
    working_dir: /opt/project
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/project/orchestration/dags
      AIRFLOW__CORE__PLUGINS_FOLDER: /opt/project/plugins
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/project/logs
      PYTHONPATH: /opt/project/src
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./:/opt/project
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-triggerer:
    image: tfl-cycle-airflow:local
    container_name: tfl-cycle-airflow-triggerer
    working_dir: /opt/project
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/project/orchestration/dags
      AIRFLOW__CORE__PLUGINS_FOLDER: /opt/project/plugins
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/project/logs
      PYTHONPATH: /opt/project/src
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./:/opt/project
    command: triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  dashboard:
    image: tfl-cycle-airflow:local
    container_name: tfl-cycle-dashboard
    working_dir: /opt/project
    env_file:
      - .env
    environment:
      PYTHONPATH: /opt/project/src
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./:/opt/project
    ports:
      - "8501:8501"
    entrypoint: /bin/bash
    command: >
      -lc "streamlit run dashboard/streamlit_app.py
      --server.address 0.0.0.0
      --server.port 8501
      --server.headless true
      --browser.gatherUsageStats false"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres-db-volume:
